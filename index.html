<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capitale</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%232563eb' stroke='%231e40af' stroke-width='2'/%3E%3Cpath d='M50 10 Q70 25 75 45 Q75 65 50 80 Q25 65 25 45 Q30 25 50 10' fill='%2310b981' opacity='0.8'/%3E%3Ccircle cx='50' cy='50' r='45' fill='none' stroke='%23dbeafe' stroke-width='1' opacity='0.5'/%3E%3C/svg%3E">

    <link rel="stylesheet" href="style/common.css">
    <link rel="stylesheet" media="screen and (min-width: 500px) and (min-height: 750px)" href="style/desktop.css">
    <link rel="stylesheet" media="screen and (max-aspect-ratio: 3/4)" href="style/mobile.css">

    <script src="src/mathHelpers.js"></script>
    <script src="src/format.js"></script>
    <script src="src/data.js"></script>
    <script src="src/random.js"></script>
    <script src="src/capitale.js"></script>
</head>
<body>
    <div id="main-container">
        <div id="header-container">
            <div class="header" id="header-hemisphere">
                <img src="https://capitale.countryle.com/assets/images/categories-icons/hemisphere.png" alt="Hemisphere Icon" style="width:32px;height:32px;">
                <span>Hemisphere</span>
            </div>
            <div class="header" id="header-continent">
                <img src="https://capitale.countryle.com/assets/images/categories-icons/continent.png" alt="Continent Icon" style="width:32px;height:32px;">
                <span>Continent</span>
            </div>
            <div class="header" id="header-population">
                <img src="https://capitale.countryle.com/assets/images/categories-icons/population.png" alt="Population Icon" style="width:32px;height:32px;">
                <span>Population</span>
            </div>
            <div class="header" id="header-distance">
                <img src="https://capitale.countryle.com/assets/images/categories-icons/distance.png" alt="Distance Icon" style="width:32px;height:32px;">
                <span>Distance</span>
            </div>
            <div class="header" id="header-direction">
                <img src="https://capitale.countryle.com/assets/images/categories-icons/direction.png" alt="Direction Icon" style="width:32px;height:32px;">
                <span>Direction</span>
            </div>
        </div>
        
        <div id="guesses-container"></div>

        <div id="input-container">
            <input type="text" id="guess-input" placeholder="Write and Select a city" list="suggestions">
            <datalist id="suggestions"></datalist>
            <button id="submit-button">Submit</button>
        </div>
    </div>
</body>
</html>
